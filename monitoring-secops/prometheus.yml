global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'sec-ops'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'app-server'
    static_configs:
      - targets: ['192.168.x.x:9100']

  - job_name: 'db-server'
    static_configs:
      - targets: ['192.168.x.x:9100']

  - job_name: 'stb-gateway'
    static_configs:
      - targets: ['192.168.x.x:9100']

  - job_name: 'docker-containers'
    static_configs:
      - targets: ['192.168.x.x:8080']
        labels:
          host: 'stb'

      - targets: ['192.168.x.x:8080']
        labels:
          host: 'app-server'

      - targets: ['192.168.x.x:8080']
        labels:
          host: 'db-server'

      - targets: ['cAdvisor:8080']
        labels:
          host: 'sec-ops'